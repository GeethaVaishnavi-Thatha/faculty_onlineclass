<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Faculty Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── DARK THEME (default) ── */
        :root, [data-theme="dark"] {
            --navy:    #0B1120;
            --slate:   #141C2E;
            --panel:   #1A2440;
            --border:  rgba(255,255,255,0.07);
            --rule:    rgba(255,255,255,0.05);
            --ink:     #4C5FD5;
            --ink-lt:  #7B8EE8;
            --stamp:   #E8A020;
            --text:    #D8DCEB;
            --muted:   #6B7694;
            --dim:     #3A4460;
            --dot-clr: rgba(76,95,213,0.12);
            --glow:    rgba(76,95,213,0.14);
            --heading: #EEF0F4;
            --shadow:  rgba(0,0,0,0.6);
        }

        /* ── LIGHT THEME ── */
        [data-theme="light"] {
            --navy:    #F0F3FA;
            --slate:   #FFFFFF;
            --panel:   #E8EBF5;
            --border:  rgba(0,0,0,0.09);
            --rule:    rgba(0,0,0,0.05);
            --ink:     #4C5FD5;
            --ink-lt:  #4C5FD5;
            --stamp:   #C07A00;
            --text:    #1E2A4A;
            --muted:   #5A6480;
            --dim:     #94A0C0;
            --dot-clr: rgba(76,95,213,0.08);
            --glow:    rgba(76,95,213,0.06);
            --heading: #1A2240;
            --shadow:  rgba(0,0,0,0.12);
        }

        body {
            min-height: 100vh;
            background: var(--navy);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, var(--dot-clr) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            width: 520px; height: 520px;
            background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
            top: -120px; left: -80px;
            pointer-events: none; z-index: 0;
        }

        /* Theme toggle */
        .theme-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 100;
            width: 38px; height: 38px;
            border-radius: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn:hover { color: var(--ink-lt); border-color: var(--ink); }

        .login-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            padding: 16px;
        }

        .classif-bar {
            background: var(--stamp);
            color: #0B1120;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; font-weight: 600;
            letter-spacing: 2px; text-align: center;
            padding: 6px 0;
            border-radius: 8px 8px 0 0;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--slate);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 16px 16px;
            padding: 36px 36px 32px;
            box-shadow: 0 24px 64px var(--shadow);
            background-image: repeating-linear-gradient(
                to bottom, transparent, transparent 39px,
                var(--rule) 39px, var(--rule) 40px
            );
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Already-logged-in banner */
        .already-in {
            background: rgba(76,95,213,0.1);
            border: 1px solid rgba(76,95,213,0.25);
            border-radius: 8px;
            padding: 12px 16px;
            display: none;
            margin-bottom: 20px;
            font-size: 0.84rem;
            color: var(--ink-lt);
        }
        .already-in a {
            color: var(--stamp);
            font-weight: 700;
            text-decoration: none;
        }
        .already-in a:hover { text-decoration: underline; }

        .brand-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
        .brand-icon {
            width: 52px; height: 52px; border-radius: 10px;
            background: var(--panel);
            border: 1px solid rgba(76,95,213,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--ink-lt); flex-shrink: 0;
        }
        .brand-text h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.7rem; color: var(--heading);
            line-height: 1; font-weight: 400;
        }
        .brand-text p {
            font-size: 0.72rem; color: var(--stamp);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-top: 3px;
        }

        .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

        .field-label {
            display: block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 7px;
        }
        .field-wrap { position: relative; margin-bottom: 16px; }
        .field-ico {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--dim); font-size: 0.82rem; pointer-events: none;
        }
        .dark-input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 11px 14px 11px 38px;
            outline: none;
            transition: all 0.2s;
        }
        .dark-input:focus {
            border-color: var(--ink);
            background: rgba(76,95,213,0.06);
            box-shadow: 0 0 0 3px rgba(76,95,213,0.15);
        }
        .dark-input::placeholder { color: var(--dim); }

        .toggle-pw {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--dim); cursor: pointer; padding: 4px;
            font-size: 0.82rem; transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--ink-lt); }

        .btn-login {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: var(--ink); color: #fff;
            font-weight: 600; font-size: 0.92rem;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 18px rgba(76,95,213,0.3);
            letter-spacing: 0.2px; margin-top: 4px;
            position: relative; overflow: hidden;
        }
        .btn-login::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-login:hover:not(:disabled) {
            background: #5C6FE5;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(76,95,213,0.4);
        }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-box {
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.25);
            border-radius: 8px; padding: 11px 14px;
            color: #FCA5A5; font-size: 0.83rem;
            display: none; margin-top: 12px;
        }

        .back-link { text-align: center; margin-top: 22px; font-size: 0.82rem; color: var(--muted); }
        .back-link a { color: var(--ink-lt); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .back-link a:hover { color: var(--heading); }

        .serial-no {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem; color: var(--dim);
            text-align: right; margin-top: 20px; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Theme toggle -->
    <button class="theme-btn" id="themeBtn" title="Toggle light/dark mode">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-wrap">
        <div class="classif-bar">
            <i class="fa-solid fa-shield-halved me-2"></i>RESTRICTED ACCESS · ADMIN ONLY
        </div>
        <div class="glass-card">

            <!-- Already logged in banner (shown if session active) -->
            <div class="already-in" id="alreadyIn">
                <i class="fa-solid fa-circle-check me-2"></i>
                You are already logged in. <a href="dashboard.html">Go to Dashboard →</a>
                &nbsp;or sign in below with different credentials.
            </div>

            <div class="brand-row">
                <div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="brand-text">
                    <h1>Faculty Hub</h1>
                    <p>AI &amp; DS Department</p>
                </div>
            </div>

            <hr class="divider">

            <form id="loginForm" novalidate autocomplete="off">
                <div class="field-wrap">
                    <label class="field-label">Username</label>
                    <span class="field-ico"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="dark-input" id="username" placeholder="admin username" autocomplete="off" required>
                </div>
                <div class="field-wrap">
                    <label class="field-label">Password</label>
                    <span class="field-ico"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="dark-input" id="password" placeholder="••••••••••••" style="padding-right:40px" required>
                    <button type="button" class="toggle-pw" id="togglePw"><i class="fa-solid fa-eye" id="pwIcon"></i></button>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                    <i class="fa-solid fa-arrow-right-to-bracket me-2" id="loginIcon"></i>Sign in to Dashboard
                </button>

                <div class="error-box" id="errorBox">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    Invalid credentials. Please try again.
                </div>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fa-solid fa-arrow-left me-1"></i>Back to Registration Form</a>
            </div>
            <div class="serial-no">REF: FAC-ADM-2026 · v2.0</div>
        </div>
    </div>

    <script>
        const ADMIN = { username: 'admin', password: 'FacultyAdmin@2026' };

        // ── Theme ──
        const savedTheme = localStorage.getItem('fhTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        document.getElementById('themeBtn').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('fhTheme', next);
            updateThemeIcon(next);
        });

        function updateThemeIcon(theme) {
            document.getElementById('themeIcon').className =
                theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        // ── Already logged in ── show banner, do NOT auto-redirect
        if (sessionStorage.getItem('adminAuth') === 'true') {
            document.getElementById('alreadyIn').style.display = 'block';
        }

        // ── Password toggle ──
        document.getElementById('togglePw').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const ico = document.getElementById('pwIcon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ico.className = inp.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        });

        // ── Login ──
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorBox');
            const spinner = document.getElementById('loginSpinner');
            const icon = document.getElementById('loginIcon');

            btn.disabled = true;
            spinner.classList.remove('d-none');
            icon.classList.add('d-none');
            errBox.style.display = 'none';

            setTimeout(() => {
                if (u === ADMIN.username && p === ADMIN.password) {
                    sessionStorage.setItem('adminAuth', 'true');
                    sessionStorage.setItem('adminUser', u);
                    window.location.href = 'dashboard.html';
                } else {
                    errBox.style.display = 'block';
                    btn.disabled = false;
                    spinner.classList.add('d-none');
                    icon.classList.remove('d-none');
                    document.getElementById('password').value = '';
                }
            }, 700);
        });
    </script>
</body>
</html>
